<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>宝宝的一天 · 日记</title>
<style>
/* ── Reset ─────────────────────────────────────────── */
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;font-family:'PingFang SC','Microsoft YaHei','Helvetica Neue',sans-serif;background:#0a0a1a;color:#fff;-webkit-tap-highlight-color:transparent;user-select:none}

/* ── Loading ───────────────────────────────────────── */
#loading{position:fixed;inset:0;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a1a;transition:opacity .8s}
#loading.hidden{opacity:0;pointer-events:none}
.load-icon{font-size:64px;margin-bottom:16px;animation:breath 2s ease-in-out infinite}
.load-text{font-size:15px;color:rgba(255,255,255,.5);letter-spacing:2px}
.load-bar{width:200px;height:3px;background:rgba(255,255,255,.08);border-radius:2px;margin-top:24px;overflow:hidden}
.load-bar-fill{height:100%;width:0;border-radius:2px;background:linear-gradient(90deg,#f7971e,#ffd200);transition:width .5s}
@keyframes breath{0%,100%{transform:scale(1);opacity:.5}50%{transform:scale(1.15);opacity:1}}

/* ── App ──────────────────────────────────────────── */
#app{width:100%;height:100%;position:relative;overflow:hidden}
#track{position:relative;width:100%;height:100%;transition:transform .65s cubic-bezier(.25,.46,.45,.94)}
.slide{position:absolute;top:0;left:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden}
.slide-bg{position:absolute;inset:0;z-index:0;transition:opacity .8s}

/* ── Content ──────────────────────────────────────── */
.slide-inner{position:relative;z-index:2;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:70px 24px 100px}

/* ── Time badge ───────────────────────────────────── */
.time-badge{position:absolute;top:env(safe-area-inset-top,18px);left:50%;transform:translateX(-50%);background:rgba(255,255,255,.1);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border-radius:20px;padding:5px 16px;font-size:12px;color:rgba(255,255,255,.65);letter-spacing:1px;z-index:10;border:1px solid rgba(255,255,255,.06);white-space:nowrap;display:flex;align-items:center;gap:5px}
.time-badge svg{width:13px;height:13px;opacity:.6}

/* ── Label ────────────────────────────────────────── */
.scene-emoji{font-size:42px;margin-bottom:8px;display:block;text-align:center;filter:drop-shadow(0 4px 16px rgba(0,0,0,.3))}
.scene-label{font-size:24px;font-weight:700;margin-bottom:4px;text-shadow:0 2px 16px rgba(0,0,0,.4);letter-spacing:2px;text-align:center}
.scene-sub{font-size:12px;color:rgba(255,255,255,.4);margin-bottom:16px;text-align:center;letter-spacing:1px}

/* ── Media card ───────────────────────────────────── */
.media-card{width:70%;max-width:300px;aspect-ratio:9/16;border-radius:18px;overflow:hidden;position:relative;z-index:3;box-shadow:0 12px 48px rgba(0,0,0,.5);background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06)}
.media-card video,.media-card img{width:100%;height:100%;object-fit:cover;display:block}
.media-ph{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;color:rgba(255,255,255,.12)}
.media-ph .ph-icon{font-size:48px;opacity:.25}
.media-ph .ph-txt{font-size:11px;letter-spacing:1px}

/* ── Interactive decor elements ───────────────────── */
.deco{position:absolute;pointer-events:none;z-index:1;opacity:.08;font-size:120px;animation:float 8s ease-in-out infinite}
.deco-1{top:8%;right:5%;animation-delay:0s}
.deco-2{bottom:12%;left:3%;animation-delay:-3s;font-size:80px}
.deco-3{top:40%;left:8%;animation-delay:-6s;font-size:60px}
@keyframes float{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-20px) rotate(5deg)}}

/* ── Timeline ─────────────────────────────────────── */
#timeline{position:fixed;right:12px;top:50%;transform:translateY(-50%);z-index:100;display:flex;flex-direction:column;align-items:center;gap:5px}
.tl-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.15);transition:all .4s;cursor:pointer;position:relative}
.tl-dot.active{width:7px;height:22px;border-radius:4px;background:linear-gradient(180deg,#f7971e,#ffd200);box-shadow:0 0 10px rgba(255,210,0,.35)}
.tl-dot .tl-lbl{position:absolute;right:16px;top:50%;transform:translateY(-50%);font-size:9px;color:rgba(255,255,255,.4);white-space:nowrap;opacity:0;transition:opacity .3s;pointer-events:none}
.tl-dot.active .tl-lbl,.tl-dot:hover .tl-lbl{opacity:1}

/* ── Bottom bar ───────────────────────────────────── */
#bottom{position:fixed;bottom:0;left:0;right:0;z-index:100;padding:10px 20px env(safe-area-inset-bottom,10px);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(0deg,rgba(10,10,26,.92) 60%,transparent)}
#bottom button{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.08);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-radius:18px;padding:7px 16px;font-size:12px;color:#fff;cursor:pointer;transition:all .25s;display:flex;align-items:center;gap:4px}
#bottom button:active{transform:scale(.93);background:rgba(255,255,255,.12)}
#bottom button:disabled{opacity:.15;pointer-events:none}
#bottom .progress{font-size:11px;color:rgba(255,255,255,.3);letter-spacing:1px}

/* ── Cycle icon ───────────────────────────────────── */
#cycle{position:fixed;top:env(safe-area-inset-top,18px);left:14px;z-index:100;font-size:18px;opacity:.5;transition:all .5s}

/* ── Particles ────────────────────────────────────── */
#particles{position:fixed;inset:0;pointer-events:none;z-index:1}

/* ── Scroll hint ──────────────────────────────────── */
#hint{position:fixed;bottom:66px;left:50%;transform:translateX(-50%);z-index:50;display:flex;flex-direction:column;align-items:center;gap:2px;color:rgba(255,255,255,.2);font-size:10px;letter-spacing:2px;animation:updown 2.5s ease-in-out infinite;pointer-events:none}
#hint .arr{font-size:18px;line-height:1}
@keyframes updown{0%,100%{opacity:.2;transform:translateX(-50%) translateY(0)}50%{opacity:.5;transform:translateX(-50%) translateY(-6px)}}

/* ── Responsive ───────────────────────────────────── */
@media(max-width:380px){.scene-label{font-size:20px}.media-card{width:65%}.scene-emoji{font-size:34px}}

/* ── BGM ────────────────────────────────────────── */
#bgm-btn{position:fixed;top:env(safe-area-inset-top,18px);right:14px;z-index:100;width:36px;height:36px;border-radius:50%;background:rgba(255,255,255,.1);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);color:#fff;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .3s}
#bgm-btn:active{transform:scale(.9)}
#bgm-btn.muted{opacity:.35}
@keyframes spin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
#bgm-btn .icon{animation:spin 3s linear infinite}
#bgm-btn.muted .icon{animation:none}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="load-icon" id="load-icon">🌙</div>
  <div class="load-text">宝宝的一天</div>
  <div class="load-bar"><div class="load-bar-fill" id="load-bar-fill"></div></div>
</div>

<!-- BGM -->
<audio id="bgm" loop preload="none">
  <source src="assets/bgm/NIGHT DANCER.mp3" type="audio/mpeg">
</audio>

<!-- Particles -->
<canvas id="particles"></canvas>

<!-- Cycle -->
<div id="cycle">🌙</div>

<!-- BGM Toggle -->
<button id="bgm-btn" class="muted"><span class="icon">♪</span></button>

<!-- App -->
<div id="app"><div id="track"></div></div>

<!-- Timeline -->
<div id="timeline"></div>

<!-- Hint -->
<div id="hint"><span>滑动探索</span><span class="arr">⌄</span></div>

<!-- Bottom -->
<div id="bottom">
  <button id="prevBtn">‹ 上一幕</button>
  <span class="progress" id="progress">1/13</span>
  <button id="nextBtn">下一幕 ›</button>
</div>

<script>
// ── Scene data ──────────────────────────────────────────────
const S = [
  {id:'sleep',       t:'00:00–08:00', l:'呼呼大睡',   e:'🌙', c:['#0a0a2e','#1a1a3e'], d:['🌙','⭐','🛏️']},
  {id:'wakeup',      t:'08:00–08:30', l:'起床咯',     e:'☀️', c:['#f5a623','#f7d794'], d:['☀️','🛏️','🌸']},
  {id:'wash',        t:'08:30–09:00', l:'洗漱',       e:'🪥', c:['#74b9ff','#a8e6cf'], d:['💧','🪥','🪞']},
  {id:'login_game',  t:'09:00–09:10', l:'代号莺',      e:'📱', c:['#7c4dff','#b388ff'], d:['📱','🎮','💎']},
  {id:'study',       t:'09:10–09:40', l:'学科一',     e:'📚', c:['#4834d4','#6c5ce7'], d:['📚','✏️','📝']},
  {id:'scroll_phone',t:'10:00–11:00', l:'刷手机',     e:'📱', c:['#a29bfe','#6c5ce7'], d:['📱','🛋️','💬']},
  {id:'lunch',       t:'11:00–12:00', l:'吃饭',       e:'🍚', c:['#fdcb6e','#e17055'], d:['🍚','🥢','🥗']},
  {id:'chat_baby',   t:'12:00–15:00', l:'和宝宝聊天', e:'💕', c:['#fd79a8','#e84393'], d:['💕','📱','😊']},
  {id:'buy_dumpling',t:'15:00–15:30', l:'买饺子皮',   e:'🥟', c:['#81ecec','#00cec9'], d:['🥟','🛍️','☀️']},
];

const CI = ['🌙','☀️','☀️','📱','📚','📱','🍚','💕','🥟'];
let i = 0, anim = false;
const track = document.getElementById('track');
const tl = document.getElementById('timeline');
const prog = document.getElementById('progress');
const cyc = document.getElementById('cycle');
const loadFill = document.getElementById('load-bar-fill');
const loadIcon = document.getElementById('load-icon');

// ── Build ───────────────────────────────────────────────────
S.forEach((s, idx) => {
  const div = document.createElement('div');
  div.className = 'slide';
  div.style.transform = `translateY(${idx*100}%)`;

  const bg = document.createElement('div');
  bg.className = 'slide-bg';
  bg.style.background = `linear-gradient(155deg, ${s.c[0]}, ${s.c[1]})`;
  div.appendChild(bg);

  // Decorative emoji
  s.d.forEach((emo, j) => {
    const e = document.createElement('div');
    e.className = 'deco deco-'+(j+1);
    e.textContent = emo;
    bg.appendChild(e);
  });

  const inner = document.createElement('div');
  inner.className = 'slide-inner';

  // Time badge
  const badge = document.createElement('div');
  badge.className = 'time-badge';
  badge.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>${s.t}`;
  inner.appendChild(badge);

  // Emoji + label
  const emoji = document.createElement('div');
  emoji.className = 'scene-emoji';
  emoji.textContent = s.e;
  inner.appendChild(emoji);

  const label = document.createElement('div');
  label.className = 'scene-label';
  label.textContent = s.l;
  inner.appendChild(label);

  const sub = document.createElement('div');
  sub.className = 'scene-sub';
  sub.textContent = '宝宝的一天';
  inner.appendChild(sub);

  // Media card
  const card = document.createElement('div');
  card.className = 'media-card';
  card.id = `mc-${s.id}`;
  card.innerHTML = `<div class="media-ph"><div class="ph-icon">${s.e}</div><div class="ph-txt">🎬 动画加载中</div></div>`;
  inner.appendChild(card);

  div.appendChild(inner);
  track.appendChild(div);

  // Timeline dot
  const dot = document.createElement('div');
  dot.className = 'tl-dot'+(idx===0?' active':'');
  dot.dataset.idx = idx;
  const sp = document.createElement('span');
  sp.className = 'tl-lbl';
  sp.textContent = s.e+' '+s.l;
  dot.appendChild(sp);
  dot.onclick = ()=>go(idx);
  tl.appendChild(dot);
});

// ── Navigation ──────────────────────────────────────────────
function go(idx) {
  if(anim || idx<0 || idx>=S.length) return;
  anim = true;
  i = idx;
  track.style.transform = `translateY(-${idx*100}%)`;
  document.querySelectorAll('.tl-dot').forEach((d,j)=>d.classList.toggle('active',j===idx));
  prog.textContent = `${idx+1}/${S.length}`;
  cyc.textContent = CI[idx]||'🌙';
  loadIcon.textContent = S[idx].e;
  document.getElementById('hint').style.display='none';
  setTimeout(()=>anim=false,700);
}

function next(){if(i<S.length-1) go(i+1)}
function prev(){if(i>0) go(i-1)}

// ── Events ──────────────────────────────────────────────────
const c = document.getElementById('app');
let sy=0,dy=0;
c.addEventListener('touchstart',e=>{sy=e.touches[0].clientY;dy=0},{passive:true});
c.addEventListener('touchmove',e=>{dy=e.touches[0].clientY-sy},{passive:true});
c.addEventListener('touchend',()=>{if(Math.abs(dy)>35)dy<0?next():prev()});
let wt=null;
c.addEventListener('wheel',e=>{
  e.preventDefault();
  if(wt)return;
  wt=setTimeout(()=>wt=null,700);
  e.deltaY>0?next():prev();
},{passive:false});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowDown'||e.key==='ArrowRight'){e.preventDefault();next()}
  if(e.key==='ArrowUp'||e.key==='ArrowLeft'){e.preventDefault();prev()}
});
document.getElementById('prevBtn').onclick=prev;
document.getElementById('nextBtn').onclick=next;

// ── Particles ───────────────────────────────────────────────
const pCanvas = document.getElementById('particles');
const pCtx = pCanvas.getContext('2d');
let pw, ph;
function pResize(){pw=pCanvas.width=window.innerWidth;ph=pCanvas.height=window.innerHeight}
pResize(); window.addEventListener('resize', pResize);
const pts = Array.from({length:50},()=>({
  x:Math.random()*pw, y:Math.random()*ph,
  r:Math.random()*2+.5, dx:(Math.random()-.5)*.3, dy:(Math.random()-.5)*.3,
  o:Math.random()*.4+.1
}));
function pDraw(){
  pCtx.clearRect(0,0,pw,ph);
  pts.forEach(p=>{
    p.x+=p.dx; p.y+=p.dy;
    if(p.x<0)p.x=pw;if(p.x>pw)p.x=0;
    if(p.y<0)p.y=ph;if(p.y>ph)p.y=0;
    pCtx.beginPath(); pCtx.arc(p.x,p.y,p.r,0,Math.PI*2);
    pCtx.fillStyle=`rgba(255,255,255,${p.o})`; pCtx.fill();
  });
  requestAnimationFrame(pDraw);
}
pDraw();

// ── Asset manifest ──────────────────────────────────────────
const ASSETS = {
  sleep:{img:'assets/scenes/sleep.jpg',vid:'assets/videos/sleep.mp4',hls:'assets/videos/hls/sleep/index.m3u8'},
  wakeup:{img:'assets/scenes/wakeup.jpg',vid:'assets/videos/wakeup.mp4',hls:'assets/videos/hls/wakeup/index.m3u8'},
  wash:{img:'assets/scenes/wash.jpg',vid:'assets/videos/wash.mp4',hls:'assets/videos/hls/wash/index.m3u8'},
  login_game:{img:'assets/scenes/login_game.jpg',vid:'assets/videos/login_game.mp4',hls:'assets/videos/hls/login_game/index.m3u8'},
  study:{img:'assets/scenes/study.jpg',vid:'assets/videos/study.mp4',hls:'assets/videos/hls/study/index.m3u8'},
  scroll_phone:{img:'assets/scenes/scroll_phone.jpg'},
  lunch:{img:'assets/scenes/lunch.jpg'},
  buy_dumpling:{img:'assets/scenes/buy_dumpling.jpg'},
};

// ── Load images first, then try HLS video ──────────────────
let imgsLoaded = 0;
const total = S.length;

function loadScene(idx, scene) {
  const el = document.getElementById(`mc-${scene.id}`);
  if (!el) { imgDone(); return; }
  const a = ASSETS[scene.id];

  if (a && a.img) {
    const img = document.createElement('img');
    img.src = a.img;
    img.alt = '';
    img.onload = () => {
      el.innerHTML = '';
      el.appendChild(img);
      imgDone();
      if (a.hls) loadHLS(el, a.hls);
      else if (a.vid) loadMP4(el, a.vid);
    };
    img.onerror = () => { imgDone(); };
  } else {
    // No assets — keep placeholder
    imgDone();
  }
}

function loadHLS(el, src) {
  const v = document.createElement('video');
  v.muted = true; v.loop = true; v.playsInline = true; v.preload = 'auto';
  const mp4 = src.replace('/hls/','/').replace('/index.m3u8','.mp4');

  // Safari native HLS — no extra library needed
  if (v.canPlayType('application/vnd.apple.mpegurl')) {
    v.src = src;
    v.onloadeddata = () => { el.innerHTML = ''; el.appendChild(v); v.play().catch(()=>{}); };
    v.onerror = () => loadMP4(el, mp4);
    return;
  }

  // Others: try dynamic hls.js load, fall back to MP4
  loadHLSjs(el, v, src, mp4);
}

function loadHLSjs(el, v, src, mp4) {
  // Check if already loaded
  if (typeof Hls !== 'undefined') {
    return initHls(el, v, src, mp4);
  }
  // Dynamic script injection
  const s = document.createElement('script');
  s.src = 'https://cdn.jsdelivr.net/npm/hls.js@0.14.17/dist/hls.min.js';
  s.onload = () => initHls(el, v, src, mp4);
  s.onerror = () => loadMP4(el, mp4);
  document.body.appendChild(s);
  // Timeout: if CDN doesn't load in 3s, fall back
  setTimeout(() => { if (typeof Hls === 'undefined') loadMP4(el, mp4); }, 3000);
}

function initHls(el, v, src, mp4) {
  if (typeof Hls === 'undefined' || !Hls.isSupported()) { loadMP4(el, mp4); return; }
  const hls = new Hls();
  hls.loadSource(src);
  hls.attachMedia(v);
  let fallback = setTimeout(() => loadMP4(el, mp4), 4000);
  hls.on(Hls.Events.MANIFEST_PARSED, () => {
    clearTimeout(fallback);
    el.innerHTML = ''; el.appendChild(v); v.play().catch(()=>{});
  });
  hls.on(Hls.Events.ERROR, (e, data) => {
    if (data.fatal) { clearTimeout(fallback); loadMP4(el, mp4); }
  });
}

function loadMP4(el, src) {
  const v = document.createElement('video');
  v.muted = true; v.loop = true; v.playsInline = true;
  v.onloadeddata = () => {
    el.innerHTML = '';
    el.appendChild(v);
    v.play().catch(()=>{});
  };
  v.src = src;
}

function imgDone() {
  imgsLoaded++;
  loadFill.style.width = Math.min(100, (imgsLoaded / total) * 100) + '%';
  if (imgsLoaded >= total) {
    setTimeout(() => document.getElementById('loading').classList.add('hidden'), 500);
  }
}

S.forEach((s, i) => loadScene(i, s));

// ── BGM ────────────────────────────────────────────────────
const bgm = document.getElementById('bgm');
const bgmBtn = document.getElementById('bgm-btn');
let bgmStarted = false;

function startBGM() {
  if (bgmStarted) return;
  bgmStarted = true;
  bgm.volume = 0.3;
  bgm.play().then(() => {
    bgmBtn.classList.remove('muted');
  }).catch(() => {});
  // Remove one-shot listeners
  document.removeEventListener('touchstart', startBGM);
  document.removeEventListener('click', startBGM);
}

// Start BGM on first user interaction
document.addEventListener('touchstart', startBGM, { once: true });
document.addEventListener('click', startBGM, { once: true });

// Toggle mute
bgmBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  if (bgm.paused) {
    bgm.play().then(() => bgmBtn.classList.remove('muted')).catch(() => {});
  } else {
    bgm.pause();
    bgmBtn.classList.add('muted');
  }
});

// ── Init ────────────────────────────────────────────────────
prog.textContent = `1/${S.length}`;
</script>
</body>
</html>
